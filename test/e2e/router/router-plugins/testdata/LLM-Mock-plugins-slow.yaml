# High-latency mock backend for least-latency e2e (contrasts with LLM-Mock-plugins.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-plugin-mock-slow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router-plugin-mock-slow
  template:
    metadata:
      labels:
        app: router-plugin-mock-slow
        router-plugin-pool: latency
    spec:
      containers:
        - name: llm-engine
          image: ghcr.io/llm-d/llm-d-inference-sim:latest
          imagePullPolicy: IfNotPresent
          args:
            - --model=kthena-plugin-mock
            - --served-model-name=router-plugin-model
            - --port=8000
            - --mode=echo
            - --time-to-first-token=500ms
            - --inter-token-latency=20ms
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 2
