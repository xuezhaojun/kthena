apiVersion: workload.serving.volcano.sh/v1alpha1
kind: ModelServing
metadata:
  name: deepseek-r1-1-5b-pd-multinode
  namespace: default
spec:
  schedulerName: volcano
  replicas: 1
  recoveryPolicy: ServingGroupRecreate
  template:
    gangPolicy:
      minRoleReplicas:
        prefill: 1
        decode: 1
    roles:
      - name: prefill
        replicas: 1
        entryTemplate:
          spec:
            containers:
              - name: leader
                image: ghcr.io/llm-d/llm-d-inference-sim:latest
                imagePullPolicy: IfNotPresent
                args:
                  - --model=kthena-mock-1.5b-prefill-multinode
                  - --served-model-name=deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
                  - --port=8000
                  - --mode=echo
                  - --time-to-first-token=0
                  - --inter-token-latency=0
                  - --prefill-time-per-token=1ms
                ports:
                  - containerPort: 8000
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 2
                  periodSeconds: 2
        workerReplicas: 1
        workerTemplate:
          spec:
            containers:
              - name: worker
                image: nginx:1.28.2
                imagePullPolicy: IfNotPresent
      - name: decode
        replicas: 1
        entryTemplate:
          spec:
            containers:
              - name: leader
                image: ghcr.io/llm-d/llm-d-inference-sim:latest
                imagePullPolicy: IfNotPresent
                args:
                  - --model=kthena-mock-1.5b-decode-multinode
                  - --served-model-name=deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
                  - --port=8000
                  - --mode=echo
                  - --time-to-first-token=0
                  - --inter-token-latency=0
                  - --kv-cache-transfer-latency=1ms
                ports:
                  - containerPort: 8000
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 2
                  periodSeconds: 2
        workerReplicas: 1
        workerTemplate:
          spec:
            containers:
              - name: worker
                image: nginx:1.28.2
                imagePullPolicy: IfNotPresent
