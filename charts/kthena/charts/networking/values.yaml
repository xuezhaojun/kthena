kthenaRouter:
  # replicas is the number of kthena-router instances to run.
  replicas: 1
  enabled: true
  tls:
    enabled: false
    # The DNS name to use for the certificate.
    dnsName: ""
    # The name of the secret to store the certificate and key.
    secretName: "kthena-router-tls"
  webhook:
    enabled: true
    port: 8443
    servicePort: 443
    tls:
      certFile: /etc/tls/tls.crt
      keyFile: /etc/tls/tls.key
      secretName: kthena-router-webhook-certs
      # serviceName is the service name used for certificate DNS names
      serviceName: kthena-router-webhook
  image:
    # repository is the container image repository for the kthena-router.
    repository: ghcr.io/volcano-sh/kthena-router
    # tag is the container image tag for the kthena-router.
    # node: edit by CI. No need to modify manually
    tag: latest
    # pullPolicy is the image pull policy for the kthena-router.
    pullPolicy: IfNotPresent
  # resource defines the resource limits and requests for the kthena-router.
  resource:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # -- The router will drain all in-flight requests before forcefully closing connections
  terminationGracePeriodSeconds: 330
  # -- Drain timeout for kthena-router graceful shutdown.
  # -- This should be less than terminationGracePeriodSeconds.
  drainTimeout: 5m
  # fairness configuration for request scheduling
  fairness:
    # enabled controls whether fairness scheduling is active
    enabled: false
    # windowSize is the sliding window duration for token usage tracking
    # Valid formats: 1m, 5m, 10m, 30m, 1h (default: 1h)
    windowSize: "1h"
    # inputTokenWeight is the weight multiplier for input tokens in priority calculation (default: 1.0)
    inputTokenWeight: 1.0
    # outputTokenWeight is the weight multiplier for output tokens in priority calculation (default: 2.0)
    outputTokenWeight: 2.0
  # sessionBoost configures session-aware boosting to maximize prefix cache hits
  # for multi-turn conversations. It is mutually exclusive with fairness.
  sessionBoost:
    # enabled controls whether session-boost scheduling is active
    enabled: false
    # header is the HTTP header used to identify conversation sessions
    header: "X-Session-ID"
    # maxSessions is the maximum number of recently-completed sessions kept "warm"
    # for boosting. It bounds an LRU cache: when exceeded, the least-recently-used
    # session is evicted automatically. Size it by the number of concurrent
    # conversations you want to keep boosted (default: 4096).
    maxSessions: 4096
    # inflightPerPod is the maximum number of inflight requests admitted per backend
    # pod. The total inflight limit is inflightPerPod multiplied by the number of
    # backend pods. 0 or unset uses the router default (16).
    inflightPerPod: 16
    # gracePeriod is the wait time after a request completes for a same-session
    # follow-up to arrive. Disabled by default (0s); enable only if you understand
    # the latency trade-off for non-boosted requests.
    gracePeriod: "0s"
    # timeout is the maximum time a request may wait in the session-boost queue
    # before it is rejected with HTTP 504. Defaults to 30s; set it to a non-positive
    # duration (e.g. "0s") to disable the timeout, in which case a request is bounded
    # only by client disconnect.
    timeout: "30s"
  # accessLog configuration for request logging
  accessLog:
    # enabled controls whether access logging is active
    enabled: true
    # format specifies the log output format: "json" or "text" (default: text)
    format: "text"
    # output specifies where to write logs: "stdout", "stderr", or file path (default: stdout)
    output: "stdout"
  # gatewayAPI configuration
  gatewayAPI:
    # enabled controls whether Gateway API related features are enabled
    enabled: false
    # inferenceExtension controls whether Gateway API Inference Extension features are enabled
    # This requires gatewayAPI.enabled to be true
    inferenceExtension: false
  # kubeAPIQPS is the QPS (queries per second) to use while talking with kubernetes apiserver
  # If 0 or not specified, uses default value (5)
  kubeAPIQPS: 0
  # kubeAPIBurst is the burst to use while talking with kubernetes apiserver
  # If 0 or not specified, uses default value (10)
  kubeAPIBurst: 0

webhook:
  enabled: true
  # replicas is the number of router-webhook instances to run.
  replicas: 1
  image:
    # repository is the container image repository for the router-webhook.
    repository: ghcr.io/volcano-sh/kthena-router-webhook
    # tag is the container image tag for the router-webhook.
    # node: edit by CI. No need to modify manually
    tag: latest
    # pullPolicy is the image pull policy for the router-webhook.
    pullPolicy: IfNotPresent
    # args are the command line arguments for the router-webhook.
    args: ["--port=8443"]
  # resource defines the resource limits and requests for the router-webhook.
  resource:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 128Mi
